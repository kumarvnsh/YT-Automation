name: Publish Video

on:
  # Scheduling is handled externally by cron-job.org (9:00am/6:00pm IST = 2/day),
  # which POSTs to this workflow's dispatches endpoint with inputs.scheduled=true.
  # GitHub's own cron was dropped: it fired 47-204min late or not at all.
  workflow_dispatch:
    inputs:
      format:
        description: "Video format"
        type: choice
        options: [short, long, both]
        default: short
      topic:
        description: "Override today's topic (optional) — leave blank for trend-driven auto pick"
        type: string
        required: false
        default: ""
      privacy_status:
        description: "Override youtube.privacy_status (optional)"
        type: choice
        options: ["", private, unlisted, public]
        default: ""
      dry_run:
        description: "Script + metadata only, no render/upload"
        type: boolean
        default: false
      no_upload:
        description: "Render but don't upload (approval-queue draft)"
        type: boolean
        default: false
      scheduled:
        description: "Set by the external cron trigger — enables the duplicate-slot guard"
        type: boolean
        default: false
      cross_post:
        description: "Also post this short to Facebook + Instagram Reels (test toggle; config meta.enabled does it for every run)"
        type: boolean
        default: false

concurrency:
  group: publish-histold
  cancel-in-progress: false

permissions:
  contents: write
  actions: write  # duplicate-slot guard lists runs and cancels its own

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      YOUTUBE_CLIENT_SECRET_FILE: secrets/client_secret.json
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }}   # used to host the mp4 as a public release asset for Meta to pull
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Protects against double-fire of the external cron trigger (retries,
      # accidental double dispatch). Applies only to dispatches marked
      # scheduled=true — manual dashboard runs are never skipped.
      - name: Duplicate-slot guard
        if: github.event.inputs.scheduled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WINDOW_MIN=45
          NOW=$(date -u +%s)
          RUNS=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/publish.yml/runs?per_page=20" \
            --jq '.workflow_runs[] | select(.id != '"${GITHUB_RUN_ID}"') | "\(.status) \(.conclusion) \(.created_at)"')
          while read -r STATUS CONCLUSION CREATED; do
            [ -z "$STATUS" ] && continue
            if [ "$STATUS" = "queued" ] || [ "$STATUS" = "in_progress" ]; then
              echo "Another publish run is already active ($CREATED) — skipping this one."
              gh run cancel "$GITHUB_RUN_ID" -R "$GITHUB_REPOSITORY"
              sleep 60; exit 1
            fi
            if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" = "success" ]; then
              AGE_MIN=$(( (NOW - $(date -u -d "$CREATED" +%s)) / 60 ))
              if [ "$AGE_MIN" -lt "$WINDOW_MIN" ]; then
                echo "Slot already published ${AGE_MIN}min ago ($CREATED) — skipping duplicate."
                gh run cancel "$GITHUB_RUN_ID" -R "$GITHUB_REPOSITORY"
                sleep 60; exit 1
              fi
            fi
          done <<< "$RUNS"

          # Daily cap: max 2 successful scheduled uploads per IST day. Counts
          # entries recorded by the pipeline in data/published_index.json.
          TODAY_IST=$(TZ=Asia/Kolkata date +%F)
          COUNT=$(python3 - "$TODAY_IST" <<'PY'
          import json, sys, pathlib
          from datetime import datetime, timezone, timedelta
          p = pathlib.Path("data/published_index.json")
          entries = json.loads(p.read_text()) if p.exists() else []
          ist = timezone(timedelta(hours=5, minutes=30))
          n = 0
          for e in entries:
              if not e.get("scheduled") or e.get("channel", "histold") != "histold":
                  continue
              try:
                  day = datetime.fromisoformat(e["published_at"]).astimezone(ist).date().isoformat()
              except (KeyError, ValueError):
                  continue
              if day == sys.argv[1]:
                  n += 1
          print(n)
          PY
          )
          if [ "$COUNT" -ge 2 ]; then
            echo "Daily cap reached ($COUNT scheduled uploads today IST) — skipping."
            gh run cancel "$GITHUB_RUN_ID" -R "$GITHUB_REPOSITORY"
            sleep 60; exit 1
          fi
          echo "No recent publish for this slot and daily cap OK ($COUNT/2) — proceeding."

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Reconstruct YouTube credentials
        env:
          YT_CLIENT_SECRET_JSON_B64: ${{ secrets.YT_CLIENT_SECRET_JSON_B64 }}
          YT_TOKEN_JSON_B64: ${{ secrets.YT_TOKEN_JSON_B64 }}
        run: |
          mkdir -p secrets
          echo "$YT_CLIENT_SECRET_JSON_B64" | base64 -d > secrets/client_secret.json
          echo "$YT_TOKEN_JSON_B64" | base64 -d > secrets/token.json

      - name: Run pipeline (time-budgeted --step loop)
        id: run_pipeline
        env:
          PUBLISH_SCHEDULED: ${{ github.event.inputs.scheduled }}
          PUBLISH_WORKFLOW: publish
          # Keep the completed stage on the runner until upload-artifact runs.
          PRESERVE_STAGE_ARTIFACT: "true"
        run: |
          FORMAT="${{ github.event.inputs.format || 'short' }}"
          TOPIC="${{ github.event.inputs.topic }}"
          PRIVACY="${{ github.event.inputs.privacy_status }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          NO_UPLOAD="${{ github.event.inputs.no_upload }}"
          CROSS_POST="${{ github.event.inputs.cross_post }}"

          [ "$CROSS_POST" = "true" ] && export META_CROSS_POST=true

          # Independent job slots: derive morning/evening from IST so each of
          # the two daily cron-job.org dispatches gets its own topic reservation.
          HOUR_IST=$(TZ=Asia/Kolkata date +%H)
          if [ "$HOUR_IST" -lt 14 ]; then
            export PUBLISH_SLOT=morning
          else
            export PUBLISH_SLOT=evening
          fi
          echo "Using publish slot: $PUBLISH_SLOT"

          ARGS=(--format "$FORMAT" --step)
          [ -n "$TOPIC" ] && ARGS+=(--topic "$TOPIC")
          [ -n "$PRIVACY" ] && ARGS+=(--privacy "$PRIVACY")
          [ "$DRY_RUN" = "true" ] && ARGS+=(--dry-run)
          [ "$NO_UPLOAD" = "true" ] && ARGS+=(--no-upload)

          STATUS="TIMEOUT"
          END=$((SECONDS + 5*3600))
          while [ $SECONDS -lt $END ]; do
            set +e
            OUT=$(python -m src.main "${ARGS[@]}" 2>&1)
            PY_STATUS=$?
            set -e
            echo "$OUT"
            if [ "$PY_STATUS" -ne 0 ]; then STATUS="ERROR"; break; fi
            if echo "$OUT" | grep -q "STATUS: DONE"; then STATUS="DONE"; break; fi
            if echo "$OUT" | grep -q "STATUS: ERROR"; then STATUS="ERROR"; break; fi
          done
          echo "pipeline_status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "DONE" ]; then
            echo "Pipeline did not complete successfully: $STATUS"
            exit 1
          fi

      - name: Resolve stage directory
        id: stage
        if: always()
        run: |
          STAGE_DIR=$(ls -td output/*/ 2>/dev/null | head -1 || true)
          STAGE_NAME=$(basename "${STAGE_DIR%/}" 2>/dev/null || true)
          echo "stage_dir=$STAGE_DIR" >> "$GITHUB_OUTPUT"
          echo "stage_name=$STAGE_NAME" >> "$GITHUB_OUTPUT"
          TITLE=$(python -c "import json,sys; print(json.load(open(sys.argv[1])).get('title',''))" "${STAGE_DIR}metadata.json" 2>/dev/null || true)
          {
            echo "title<<EOF_TITLE"
            echo "$TITLE"
            echo "EOF_TITLE"
          } >> "$GITHUB_OUTPUT"

      - name: Record pending approval
        if: ${{ github.event.inputs.no_upload == 'true' && steps.run_pipeline.outputs.pipeline_status == 'DONE' }}
        env:
          STAGE_NAME: ${{ steps.stage.outputs.stage_name }}
          TITLE: ${{ steps.stage.outputs.title }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          path = Path("data/pending_approvals.json")
          entries = json.loads(path.read_text()) if path.exists() else []
          entries.append({
              "run_id": os.environ["RUN_ID"],
              "stage_dir_name": os.environ["STAGE_NAME"],
              "title": os.environ.get("TITLE", ""),
              "created": datetime.now(timezone.utc).isoformat(),
          })
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(entries, indent=2))
          PYEOF

      - name: Commit dedup state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Concurrent runs (the other publish slot, analytics, republish) also
          # append to these JSON lists; a plain commit+rebase dies on content
          # conflicts. Union-merge with origin instead, then rebuild the commit
          # directly on the origin tip so it always applies cleanly.
          for attempt in 1 2 3; do
            git fetch origin master
            python scripts/merge_json_state.py --ref origin/master
            git reset --mixed origin/master
            git add data/used_topics.json data/pending_approvals.json data/published_index.json data/topic_reservations.json 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "No changes to commit."
              break
            fi
            git commit -m "chore: update used topics / approval queue [skip ci]"
            if git push origin HEAD:master; then
              break
            fi
            echo "Push raced with another run (attempt $attempt) — refetching and remerging."
          done

      - name: Upload run artifact (also used by approve.yml for no-upload drafts)
        if: always() && steps.stage.outputs.stage_dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ steps.stage.outputs.stage_name }}
          path: ${{ steps.stage.outputs.stage_dir }}
          retention-days: 14
          if-no-files-found: ignore
