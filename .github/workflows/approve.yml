name: Approve Pending Video

# Resumes a stage that was rendered by publish.yml with no_upload=true (an
# approval-queue draft): downloads that run's artifact, rehydrates the stage
# directory, and finishes with the upload step.

on:
  workflow_dispatch:
    inputs:
      stage_dir_name:
        description: "Stage directory name, e.g. 20260704_180000_short"
        type: string
        required: true
      source_run_id:
        description: "The publish.yml run ID that rendered this draft"
        type: string
        required: true

permissions:
  contents: write
  actions: read

jobs:
  approve:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      YOUTUBE_CLIENT_SECRET_FILE: secrets/client_secret.json
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Reconstruct YouTube credentials
        env:
          YT_CLIENT_SECRET_JSON_B64: ${{ secrets.YT_CLIENT_SECRET_JSON_B64 }}
          YT_TOKEN_JSON_B64: ${{ secrets.YT_TOKEN_JSON_B64 }}
        run: |
          mkdir -p secrets
          echo "$YT_CLIENT_SECRET_JSON_B64" | base64 -d > secrets/client_secret.json
          echo "$YT_TOKEN_JSON_B64" | base64 -d > secrets/token.json

      - name: Download rendered draft artifact
        uses: actions/download-artifact@v4
        with:
          name: run-${{ inputs.stage_dir_name }}
          path: output/${{ inputs.stage_dir_name }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resume with upload
        run: |
          python -m src.main --stage "${{ inputs.stage_dir_name }}" --resume --force-upload

      - name: Remove entry from pending approvals
        run: |
          python - <<'PYEOF'
          import json
          from pathlib import Path

          path = Path("data/pending_approvals.json")
          if path.exists():
              entries = json.loads(path.read_text())
              entries = [e for e in entries if e.get("stage_dir_name") != "${{ inputs.stage_dir_name }}"]
              path.write_text(json.dumps(entries, indent=2))
          PYEOF

      - name: Commit approval queue + dedup state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pending_approvals.json data/used_topics.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: approve + upload ${{ inputs.stage_dir_name }} [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
