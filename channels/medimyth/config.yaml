# ===========================================================================
# MediMyth — medical facts & myths channel (captions-only animated shorts)
# Shares the code in ../../src ; all data lives in this folder.
# Run: python -m src.main --config channels/medimyth/config.yaml --step
# ===========================================================================

channel:
  niche: "Medical facts & myths"
  persona: >
    You write accurate, evidence-based short-form videos that bust common health
    myths and explain how the body really works ("fact vs myth" style). Ground every
    claim in mainstream medical/scientific consensus. Hook the viewer in the first line,
    reveal the myth, then the evidence-based fact, and end with a memorable takeaway.
    STRICT RULES: do NOT give personal medical advice, diagnoses, dosages, or treatment
    instructions. No fear-mongering, no dangerous or fringe claims, nothing that could
    lead someone to harm. Keep it general education, advertiser-friendly, and frame it
    as informational — not a substitute for a doctor.
  language: "en"
  # Per-channel topic angles (keeps MediMyth on medical topics, not history).
  angles:
    - "a common health myth most people still believe"
    - "a surprising fact about how the human body works"
    - "a myth about the common cold, flu, or immune system"
    - "a misunderstood fact about sleep and the brain"
    - "a food or nutrition myth debunked by science"
    - "a surprising origin of a medical term or practice"
    - "a myth about exercise, muscles, or metabolism"
    - "a fascinating fact about the heart or blood"
    - "a debunked myth about the five senses"
    - "a strange but true fact from medical history"
    - "a misconception about vaccines or antibiotics (accurate, pro-science)"
    - "a surprising fact about the brain and memory"
    - "a myth about hydration, caffeine, or the digestive system"
    - "an everyday health 'rule' that is actually a myth"

script:
  provider: "anthropic"
  anthropic_model: "claude-sonnet-4-6"
  openai_model: "gpt-4o-mini"
  shorts_target_seconds: 45
  longform_target_seconds: 420

tts:
  provider: "edge"
  edge_voice: "en-US-AriaNeural"     # distinct voice from Histold (Guy)
  edge_rate: "+6%"
  elevenlabs_voice_id: "21m00Tcm4TlvDq8ikWAM"
  openai_voice: "nova"

assets:
  provider: "pexels"                  # unused in captions_only mode
  per_segment_clips: 1
  prefer_video: true
  orientation_short: "portrait"
  orientation_long: "landscape"

video:
  short:
    width: 1080
    height: 1920
    fps: 30
  long:
    width: 1920
    height: 1080
    fps: 30
  encode:
    preset: "veryfast"
    crf: 23
  mode: "broll"                       # topic-matched stock footage + captions, no mascot
  captions:
    enabled: true
    font: "Arial"
    fontsize_short: 104               # larger — captions are the whole visual
    fontsize_long: 56
    outline: 7
    margin_bottom: 220
    margin_top: 380
    primary_color: "&H00FFFFFF"
    outline_color: "&H00000000"

youtube:
  enabled: true
  privacy_status: "private"           # MEDICAL CONTENT: review before making public
  category_id: "27"                   # Education
  made_for_kids: false
  expected_channel_id: ""             # fill in after OAuth + whoami (locks uploads to MediMyth)
  default_tags: ["medical facts", "health myths", "did you know", "medicine", "health", "myth vs fact", "science"]

notifications:
  enabled: false                      # enable + set OpenWA vars in this channel's .env if you want alerts
  channel: "openwa"
  notify_on_start: false
  notify_on_success: true
  notify_on_failure: true
  notify_on_credits: true

output:
  dir: "output"
  delete_after_upload: true
  keep_days: 3
