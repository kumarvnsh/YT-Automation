# ===========================================================================
# YT-Automation configuration
# Edit this file to change the channel niche, video style, and providers.
# Anything secret (API keys) lives in .env, NOT here.
# ===========================================================================

channel:
  niche: "History / Did-you-know"
  # High-level instruction handed to the script writer. Tune the voice here.
  persona: >
    You write punchy, accurate, surprising history and 'did you know' content.
    Open on an unresolved gap, stay factually correct, avoid sensitive/graphic
    detail, and close by calling back to your opening line so it means
    something new. No clickbait that the content doesn't deliver on.
  language: "en"
  # Trend-aware topics: bridge trending searches to history + use anniversaries.
  topic_source: "blend"          # "angles" | "trends" | "on_this_day" | "blend"
  trend_region: "global"
  # Topics already used are stored in data/used_topics.json to avoid repeats.

# Recurring named series. Every Nth video becomes an episode: it ignores the
# trend signals and follows series.direction instead, and its title carries
# " | <name>" so the run is recognisable. Blank name disables the series.
series:
  name: "History's Almost Moments"
  every: 3                       # 1 = every video, 3 = every third
  direction: ""                  # blank = built-in counterfactual brief

script:
  provider: "anthropic"        # primary provider: "anthropic" | "openai"
  routing: "fallback"          # "fallback" | "random" | "round_robin"
  fallback_provider: "openai"
  anthropic_model: "claude-sonnet-4-6"
  openai_model: "gpt-4o-mini"
  # Require the four-beat looping structure (hook / setup / pivot / fact stack
  # / callback) on every short, enforced at generation and again at the quality
  # gate. Derived from the only Histold shorts that exceeded 100% average view
  # percentage. Needs shorts_target_seconds >= 45 to fit the beats.
  enforce_beats: true
  # Target spoken duration. The writer aims for ~150 words/min.
  # Do NOT lower this below 45. Every short on this channel that exceeded 100%
  # average view percentage ran 44s+; the 20s era (commit 886d4a5, 2026-07-10)
  # averaged 10-14s watched vs 44-74s, a ~6x loss of watch time per view.
  shorts_target_seconds: 45
  longform_target_seconds: 420   # 7 minutes

tts:
  provider: "edge"             # "edge" (free) | "elevenlabs" | "openai"
  edge_voice: "en-US-GuyNeural"        # try en-US-AriaNeural, en-GB-RyanNeural
  edge_rate: "+8%"
  elevenlabs_voice_id: "21m00Tcm4TlvDq8ikWAM"   # only used if provider=elevenlabs
  openai_voice: "onyx"                          # only used if provider=openai

assets:
  provider: "pexels"           # "pexels" (videos+photos)
  per_segment_clips: 3
  prefer_video: true           # use stock video clips; fall back to photos
  orientation_short: "portrait"
  orientation_long: "landscape"
  # Generate one topical illustration per segment (shorts only) instead of
  # pulling generic stock. Any failure falls back to the Pexels chain below,
  # so this can never break a run.
  ai_images:
    enabled: true
    # "illustrative" and "painterly" render engraved/painted plates. YouTube
    # requires disclosure only for synthetic media a viewer could mistake for
    # real footage, so these carry NO disclosure obligation and never present
    # a fabricated image as evidence of a real person or event.
    # "photoreal" gives up both protections: if you switch to it you must tick
    # "altered or synthetic content" on every upload.
    style: "illustrative"
    # Which beats get a generated still; every other beat keeps moving stock
    # footage. A short built entirely from stills reads as a slideshow, so
    # images are spent where specificity pays — the pivot and the fact stack,
    # which make concrete claims — while hook/setup/callback keep motion.
    # Set to [] to generate an image for every segment instead.
    beats: ["pivot", "fact"]
    # Hard cap on generated images per video. When fewer than the eligible
    # beats, the survivors are spread evenly across them (the pivot is always
    # kept) so the stills don't bunch up in one stretch of the short.
    # 0 = no cap. At 2 this is the pivot and the final, strongest fact.
    max_images: 2
    model: "gpt-image-1"       # uses the existing OPENAI_API_KEY
    size: "1024x1536"          # portrait, matches the 1080x1920 short
    quality: "medium"          # "low" | "medium" | "high" — cost scales with this
    # Per-image hard timeout. A hung request falls back to stock footage
    # instead of stalling a time-budgeted run.
    timeout_seconds: 90
    # Cost note: max_images caps spend per video. Multiply by your upload
    # cadence (currently 2/day: cron-job.org dispatches morning + evening)
    # and check current per-image pricing before raising it.

video:
  short:
    width: 1080
    height: 1920
    fps: 30
  long:
    width: 1920
    height: 1080
    fps: 30
  encode:
    preset: "veryfast"         # ffmpeg x264 preset; faster = quicker render, slightly larger file
    crf: 23                    # 18-28; lower = higher quality/larger. 23 is a good balance
  # Visual mode for SHORTS: "mascot" (talking owl on branded bg) or "broll" (stock footage).
  # Long-form always uses b-roll (mascot full-frame render is too heavy for 7-min videos).
  mode: "broll"               # topic-matched stock footage + captions, no mascot
  color_grade:
    enabled: true
    filter: "eq=contrast=1.05:saturation=0.9:gamma=0.95"
  mascot:
    dir: "Mascot"              # (unused while mode is broll; kept if you switch back)
    scale: 0.48
    margin_right: 30
    margin_bottom: 230
  captions:
    enabled: true
    font: "Arial"
    fontsize_short: 96               # real pixels (subtitle canvas = video resolution)
    fontsize_long: 56
    outline: 6
    words_per_beat: 4                 # words grouped per caption card (3-6 typical for fast-paced shorts)
    margin_bottom: 220               # px from bottom (broll mode)
    margin_top: 380                  # px from top (mascot mode, clear of the corner owl)
    primary_color: "&H00FFFFFF"      # white  (ASS BGR hex)
    outline_color: "&H00000000"      # black outline
  background_music:
    enabled: true
    # Drop royalty-free .mp3 files in assets/music/. One is picked at random.
    volume: 0.12

quality:
  # Deterministic local checks run after compose and before upload. A failed
  # check blocks the upload; the report is saved to <stage>/quality.json.
  enabled: true
  min_duration_ratio: 0.75     # video/voiceover + narration/target lower bound
  max_duration_ratio: 1.35     # ...and upper bound
  banned_terms: ["graphic sexual", "extreme gore"]

youtube:
  enabled: true
  privacy_status: "public"     # "private" | "unlisted" | "public"
  category_id: "27"            # 27 = Education
  made_for_kids: false
  # Safety lock: uploads abort unless the authorized channel matches this ID.
  # This is the Histold channel. Leave blank to disable the check.
  expected_channel_id: "UCJImBb1E8e0llDt8ISdF_1g"
  default_tags: ["history", "did you know", "facts", "history shorts", "education", "shorts", "viral", "trending"]

republish:
  # Auto-repost stuck videos: checked after every analytics export (~6h).
  # One auto attempt per video ever; manual dashboard buttons unaffected.
  auto: true
  view_threshold: 100     # flag videos still under this many views...
  min_age_hours: 30       # ...this long after publish (24h rule + 6h analytics lag)
  max_age_days: 13        # repost needs the render artifact (14d retention, 1d margin)
  max_per_check: 1        # dispatch at most this many republishes per analytics run
  mode: repost            # repost (delete + re-upload, new title) | retitle (title swap only)

meta:
  # Cross-post rendered shorts to Facebook Reels + Instagram Reels via the Graph
  # API. Requires the META_ACCESS_TOKEN secret (non-expiring System User token).
  # Only shorts (vertical 1080x1920) are cross-posted. Best-effort: a Meta
  # failure never blocks the YouTube upload.
  enabled: true                # master switch; every short cross-posts to FB + IG (scheduled + manual)
  post_to_facebook: true
  post_to_instagram: true
  page_id: "1194740133719930"          # Histold Facebook Page
  ig_user_id: "17841410834243353"      # Histold Instagram business account
  api_version: "v21.0"
  hashtags: ["#history", "#shorts", "#didyouknow", "#historyfacts"]

notifications:
  enabled: true                # master switch for WhatsApp alerts
  channel: "openwa"            # currently only OpenWA is implemented
  notify_on_start: false       # ping when a daily run begins
  notify_on_success: true      # ping when a video uploads (or renders, if no-upload)
  notify_on_failure: true      # ping on any failure
  notify_on_credits: true      # special alert when AI credits run out / flow stops

output:
  dir: "output"                # rendered videos + metadata land here
  delete_after_upload: true    # once uploaded to YouTube, delete the local renders (saves disk)
  keep_days: 3                 # also prune leftover run folders older than this many days
