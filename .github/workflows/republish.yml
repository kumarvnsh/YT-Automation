name: Republish Video

# Retitle or repost an underperforming video, triggered from the dashboard's
# Underperformers panel. retitle = swap the title in place. repost = download
# the original run's rendered artifact, re-upload under a fresh title, then
# delete the old video. Needs the full 'youtube' manage scope in the token
# (GITHUB_ACTIONS_SETUP.md §6).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Action"
        type: choice
        options: [retitle, repost]
        required: true
      video_id:
        description: "YouTube video ID of the underperformer"
        type: string
        required: true
      source_run_id:
        description: "publish.yml run ID that rendered it (repost only)"
        type: string
        required: false
        default: ""
      stage_dir_name:
        description: "Stage directory name, e.g. 20260704_180000_short (repost only)"
        type: string
        required: false
        default: ""
      channel:
        description: "Channel"
        type: choice
        options: [histold, medimyth]
        default: histold

permissions:
  contents: write
  actions: read

jobs:
  republish:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      YOUTUBE_CLIENT_SECRET_FILE: secrets/client_secret.json
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Reconstruct YouTube credentials
        env:
          YT_CLIENT_SECRET_JSON_B64: ${{ inputs.channel == 'medimyth' && secrets.YT_MEDIMYTH_CLIENT_SECRET_JSON_B64 || secrets.YT_CLIENT_SECRET_JSON_B64 }}
          YT_TOKEN_JSON_B64: ${{ inputs.channel == 'medimyth' && secrets.YT_MEDIMYTH_TOKEN_JSON_B64 || secrets.YT_TOKEN_JSON_B64 }}
        run: |
          if [ "${{ inputs.channel }}" = "medimyth" ]; then
            SECRETS_DIR=channels/medimyth/secrets
          else
            SECRETS_DIR=secrets
          fi
          mkdir -p "$SECRETS_DIR"
          echo "$YT_CLIENT_SECRET_JSON_B64" | base64 -d > "$SECRETS_DIR/client_secret.json"
          echo "$YT_TOKEN_JSON_B64" | base64 -d > "$SECRETS_DIR/token.json"

      - name: Download original render artifact
        if: inputs.mode == 'repost'
        uses: actions/download-artifact@v4
        with:
          name: run-${{ inputs.stage_dir_name }}
          path: ${{ inputs.channel == 'medimyth' && format('channels/medimyth/output/{0}', inputs.stage_dir_name) || format('output/{0}', inputs.stage_dir_name) }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Republish
        env:
          CHANNEL_LABEL: ${{ inputs.channel }}
        run: |
          ARGS=(--mode "${{ inputs.mode }}" --video-id "${{ inputs.video_id }}")
          [ -n "${{ inputs.stage_dir_name }}" ] && ARGS+=(--stage-dir-name "${{ inputs.stage_dir_name }}")
          [ "${{ inputs.channel }}" = "medimyth" ] && ARGS+=(--config channels/medimyth/config.yaml)
          python scripts/republish.py "${ARGS[@]}"

      - name: Commit published index
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/published_index.json channels/*/data/published_index.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: republish ${{ inputs.video_id }} (${{ inputs.mode }}) [skip ci]"
            git pull --rebase --autostash
            git push
          else
            echo "No changes to commit."
          fi
