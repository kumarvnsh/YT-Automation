name: Deploy Dashboard

# The repo's Pages source is "GitHub Actions", which disables automatic
# branch builds — without this workflow the dashboard never redeploys.
# Deploys docs/ whenever it changes on master, or on manual dispatch.
# Data files (analytics.json, trends.json, ...) are fetched by the
# dashboard at page-load time via the GitHub API, so data-only commits
# do not need a redeploy.

on:
  push:
    branches: [master]
    paths: ["docs/**"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
