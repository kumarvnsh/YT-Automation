name: Export Analytics & Trends

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write  # auto-republish dispatches republish.yml

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Reconstruct YouTube credentials
        env:
          YT_CLIENT_SECRET_JSON_B64: ${{ secrets.YT_CLIENT_SECRET_JSON_B64 }}
          YT_TOKEN_JSON_B64: ${{ secrets.YT_TOKEN_JSON_B64 }}
        run: |
          mkdir -p secrets
          echo "$YT_CLIENT_SECRET_JSON_B64" | base64 -d > secrets/client_secret.json
          echo "$YT_TOKEN_JSON_B64" | base64 -d > secrets/token.json

      - name: Export analytics + trends and wrap for the dashboard
        run: |
          # playlistItems.list (1 quota unit) + videos.list (1 unit/50 ids) —
          # well under YouTube's 10k/day cap even at 4 runs/day.
          python scripts/export_analytics.py --label histold
          python scripts/merge_channel_json.py --labels histold --out data/analytics.json data/analytics.json

          python scripts/export_trends.py --label histold
          python scripts/merge_channel_json.py --labels histold --out data/trends.json data/trends.json

      - name: Export Facebook + Instagram analytics
        id: meta_analytics
        continue-on-error: true
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python scripts/export_meta_analytics.py

      # Auto-republish stuck videos (config republish.auto). Dispatches
      # republish.yml per candidate and stamps auto_dispatched_at in the index
      # so each video gets exactly one automatic attempt.
      - name: Auto-republish underperformers
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/auto_republish.py --label histold

      - name: Commit exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for file in data/analytics.json data/trends.json data/published_index.json; do
            [ -f "$file" ] && git add "$file"
          done
          if [ "${{ steps.meta_analytics.outcome }}" = "success" ] && [ -f data/meta_analytics.json ]; then
            git add data/meta_analytics.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh analytics + trends [skip ci]"
            git pull --rebase --autostash
            git push
          else
            echo "No changes to commit."
          fi

      - name: Report Meta analytics failure
        if: steps.meta_analytics.outcome == 'failure'
        run: |
          echo "Facebook/Instagram analytics export failed; inspect the exporter logs above."
          exit 1
