# Astrotold is intentionally self-contained: credentials, output, and state
# live beside this configuration file rather than in the Histold channel paths.

channel:
  name: "Astrotold"
  niche: "numerology"
  language: "en"
  persona: >
    You are Astrotold, a warm, upbeat numerology guide who gives playful,
    respectful number readings for curious viewers.
  language_instruction: >
    Write English-only scripts and captions. Keep them easy to speak aloud,
    friendly, inclusive, and natural for an international audience.
  content_rules: >
    Keep readings upbeat and entertainment-focused. For every visual beat,
    provide concrete English asset-search keywords such as "birth number
    chart", "close-up birthday calendar", "golden number six", "colorful
    initial letter", "lucky number card", or "number pattern notebook".
  safety_rules: >
    Strictly for entertainment only: never promise outcomes or claim certainty.
    Do not provide medical, legal, financial, or emergency advice, and never
    discourage viewers from seeking qualified professional help.
  topic_source: "angles"
  trend_region: "india"
  angles:
    - "What birth dates 6, 15, and 24 reveal in playful numerology"
    - "Current-month guidance for each birth-number group"
    - "Fun personality cues for name initials"
    - "Lucky colour, number, and day for an entertainment reading"
    - "How to calculate your birth number in numerology"
    - "What your name initials can reveal in a playful reading"

series:
  name: ""
  every: 3
  direction: ""

script:
  provider: "anthropic"
  routing: "fallback"
  fallback_provider: "openai"
  anthropic_model: "claude-sonnet-4-6"
  openai_model: "gpt-4o-mini"
  # Histold's four-beat structure (hook / setup / pivot / fact stack /
  # callback) is deliberately OFF here: it was derived from history-shorts
  # retention data and needs ~110 words, which does not fit this 28s budget.
  # Turning it on requires raising shorts_target_seconds to 45 first.
  enforce_beats: false
  shorts_target_seconds: 28
  longform_target_seconds: 420

tts:
  provider: "edge"
  edge_voice: "en-US-GuyNeural"
  edge_rate: "+4%"

assets:
  provider: "pexels"
  per_segment_clips: 3
  prefer_video: true
  orientation_short: "portrait"
  orientation_long: "landscape"

video:
  mode: "broll"
  short:
    width: 1080
    height: 1920
    fps: 30
  long:
    width: 1920
    height: 1080
    fps: 30
  encode:
    preset: "veryfast"
    crf: 23
  color_grade:
    enabled: true
    filter: "eq=contrast=1.05:saturation=0.9:gamma=0.95"
  captions:
    enabled: true
    font: "Arial"
    fontsize_short: 96
    fontsize_long: 56
    outline: 6
    words_per_beat: 4
    margin_bottom: 220
    margin_top: 380
    primary_color: "&H00FFFFFF"
    outline_color: "&H00000000"
  background_music:
    enabled: true
    volume: 0.12

quality:
  enabled: true
  min_duration_ratio: 0.75
  max_duration_ratio: 1.35
  banned_terms: ["graphic sexual", "extreme gore"]

youtube:
  # Keep uploads disabled until the owner verifies and locks this channel ID.
  enabled: true
  privacy_status: "public"
  category_id: "22"
  made_for_kids: false
  # Leave blank until the verified Astrotold channel ID is available.
  expected_channel_id: "UClCsmM8etN14YjUJ3mMJA8Q"
  default_tags:
    - "numerology"
    - "birth number"
    - "name initials"
    - "lucky number"
    - "Astrotold"
    - "shorts"

republish:
  auto: false
  view_threshold: 100
  min_age_hours: 30
  max_age_days: 13
  max_per_check: 1
  mode: "repost"

meta:
  enabled: false
  post_to_facebook: false
  post_to_instagram: false
  api_version: "v21.0"
  hashtags: ["#numerology", "#birthnumber", "#luckynumber", "#shorts"]

notifications:
  enabled: false
  channel: "openwa"
  notify_on_start: false
  notify_on_success: false
  notify_on_failure: true
  notify_on_credits: true

output:
  # load_config() makes this config directory the base directory.
  dir: "output"
  delete_after_upload: false
  keep_days: 7
